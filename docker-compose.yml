services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veda}
      POSTGRES_USER: ${POSTGRES_USER:-veda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veda_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veda} -d ${POSTGRES_DB:-veda}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./data:/app/data
      - ./backups:/backups

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "app.scheduler"]
    environment:
      SOURCE_EXTRACTION_ON_START: "false"
      SOURCE_EXTRACTION_INTERVAL_SECONDS: "86400"
    volumes:
      - ./data:/app/data
      - ./backups:/backups

  extraction-backlog:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "scripts/run_extraction_backlog.py"]
    environment:
      VEDA_API_URL: http://api:8000
      EXTRACTION_BACKLOG_WORKER_INDEX: "0"
      EXTRACTION_BACKLOG_WORKER_COUNT: "3"
      EXTRACTION_BACKLOG_BATCH_LIMIT: ${EXTRACTION_BACKLOG_BATCH_LIMIT:-25}
      EXTRACTION_BACKLOG_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_SLEEP_SECONDS:-30}
      EXTRACTION_BACKLOG_DONE_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_DONE_SLEEP_SECONDS:-900}
      EXTRACTION_BACKLOG_ERROR_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_ERROR_SLEEP_SECONDS:-300}
    volumes:
      - ./data:/app/data
      - ./backups:/backups

  extraction-backlog-1:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "scripts/run_extraction_backlog.py"]
    environment:
      VEDA_API_URL: http://api:8000
      EXTRACTION_BACKLOG_WORKER_INDEX: "1"
      EXTRACTION_BACKLOG_WORKER_COUNT: "3"
      EXTRACTION_BACKLOG_BATCH_LIMIT: ${EXTRACTION_BACKLOG_BATCH_LIMIT:-25}
      EXTRACTION_BACKLOG_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_SLEEP_SECONDS:-30}
      EXTRACTION_BACKLOG_DONE_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_DONE_SLEEP_SECONDS:-900}
      EXTRACTION_BACKLOG_ERROR_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_ERROR_SLEEP_SECONDS:-300}
    volumes:
      - ./data:/app/data
      - ./backups:/backups

  extraction-backlog-2:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "scripts/run_extraction_backlog.py"]
    environment:
      VEDA_API_URL: http://api:8000
      EXTRACTION_BACKLOG_WORKER_INDEX: "2"
      EXTRACTION_BACKLOG_WORKER_COUNT: "3"
      EXTRACTION_BACKLOG_BATCH_LIMIT: ${EXTRACTION_BACKLOG_BATCH_LIMIT:-25}
      EXTRACTION_BACKLOG_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_SLEEP_SECONDS:-30}
      EXTRACTION_BACKLOG_DONE_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_DONE_SLEEP_SECONDS:-900}
      EXTRACTION_BACKLOG_ERROR_SLEEP_SECONDS: ${EXTRACTION_BACKLOG_ERROR_SLEEP_SECONDS:-300}
    volumes:
      - ./data:/app/data
      - ./backups:/backups

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/dashboard

volumes:
  postgres_data:
  redis_data:
  chroma_data:
