map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;

  resolver 127.0.0.11 valid=10s ipv6=off;

  auth_basic "Veda Trading System";
  auth_basic_user_file /etc/nginx/.htpasswd;

  location = /api {
    return 308 /api/;
  }

  location ~ ^/api/(.*)$ {
    set $api_upstream http://api:8000;
    proxy_pass $api_upstream/$1$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /crypto {
    return 308 /crypto/;
  }

  location ^~ /crypto/ {
    proxy_pass http://host.docker.internal:8101/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /crypto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    add_header Cache-Control "no-store" always;
  }

  location / {
    set $dashboard_upstream http://dashboard:8501;
    proxy_pass $dashboard_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    add_header Cache-Control "no-store" always;
  }
}
